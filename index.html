<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орехово-Зуево</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f5a66">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="install-banner" id="installBanner">
        Установите приложение <button id="installBtn">Установить</button>
    </div>
    <div class="offline" id="offlineBanner">Вы офлайн. Данные из кэша.</div>
    
    <div class="header">
        <h1>Орехово-Зуево</h1>
        <span class="badge">Все места в городе</span>
        <span class="pwa">PWA</span>
    </div>
    <div class="subhead">Достопримечательности · адрес + описание</div>

    <div style="text-align: center; margin-bottom: 1.5rem;">
        <button id="notifyBtn" class="notify-btn">Включить уведомления</button>
    </div>

    <div class="grid" id="placesGrid"></div>

    <div class="add-section">
        <h3>Добавить место</h3>
        <div class="form">
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="placeName" placeholder="Название" maxlength="40">
            </div>
            <div class="form-group">
                <label>Адрес</label>
                <input type="text" id="placeAddress" placeholder="ул. Ленина, 10" maxlength="60">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <input type="text" id="placeDesc" placeholder="Кратко" maxlength="80">
            </div>
            <button class="add-btn" id="addPlaceBtn">Добавить</button>
        </div>
    </div>
    
    <div class="footer">
        <span>Орехово-Зуево</span>
        <span>Нажмите для удаления</span>
        <span>Работает офлайн</span>
        <span>Уведомления</span>
    </div>
</div>

<script>
// Данные
const defaultPlaces = [
    {name:'Парк Победа',address:'ул. Ленина, 1, Орехово-Зуево',desc:'Центральный парк с фонтаном',type:'парк'},
    {name:'Краеведческий музей',address:'ул. Ленина, 15, Орехово-Зуево',desc:'История города',type:'музей'},
    {name:'ДК Октябрь',address:'ул. Ленина, 56, Орехово-Зуево',desc:'Культурный центр',type:'досуг'},
    {name:'Набережная Клязьмы',address:'ул. Набережная, 2, Орехово-Зуево',desc:'Прогулка у воды',type:'природа'},
    {name:'Сквер Молодёжный',address:'ул. Мира, 12, Орехово-Зуево',desc:'Тихий сквер',type:'отдых'},
    {name:'Фонтан на площади',address:'пл. Пушкина, 1, Орехово-Зуево',desc:'Главный фонтан',type:'достопримечательность'},
    {name:'Собор Рождества Богородицы',address:'ул. Ленина, 78, Орехово-Зуево',desc:'Главный храм',type:'храм'}
];

let places = [];
let deferredPrompt = null;

// Загрузка данных
function loadData() {
    try {
        const saved = localStorage.getItem('places');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                places = parsed;
                return;
            }
        }
    } catch(e) {}
    places = defaultPlaces.map(p => ({...p}));
    saveData();
}

function saveData() {
    try {
        localStorage.setItem('places', JSON.stringify(places));
    } catch(e) {}
}

// Уведомления
function requestNotificationPermission() {
    if (!("Notification" in window)) {
        showToast('Браузер не поддерживает уведомления');
        return;
    }

    Notification.requestPermission().then(permission => {
        if (permission === "granted") {
            console.log("Разрешение на уведомления получено");
            showNotification(
                "Уведомления включены",
                "Вы будете получать уведомления от Орехово-Зуево"
            );
            showToast('Уведомления включены');
        } else {
            console.log("Разрешение на уведомления отклонено");
            showToast('Уведомления отключены');
        }
    });
}

function showNotification(title, body) {
    if (!("Notification" in window) || Notification.permission !== "granted") {
        showToast('Сначала включите уведомления');
        return;
    }

    const options = {
        body: body || "Привет от Орехово-Зуево",
        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>",
        badge: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>",
        vibrate: [200, 100, 200],
        requireInteraction: true,
        data: {
            url: window.location.href
        }
    };

    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(registration => {
            registration.showNotification(title || "Орехово-Зуево", options);
        });
    } else {
        new Notification(title || "Орехово-Зуево", options);
    }
}

function notifyNewPlace(placeName) {
    if (Notification.permission === "granted") {
        showNotification(
            "Новое место",
            "Добавлено: " + placeName + " в Орехово-Зуево"
        );
    }
}

// Рендер
function render() {
    const grid = document.getElementById('placesGrid');
    if (!places.length) {
        grid.innerHTML = '<div class="empty">Нет мест. Добавьте первое.</div>';
        return;
    }
    
    grid.innerHTML = places.map((p, i) => `
        <div class="card">
            <div class="name">${escapeHtml(p.name)}</div>
            <button class="del" data-index="${i}">X</button>
            <div class="address">${escapeHtml(p.address || 'адрес не указан')}</div>
            <div class="desc">${escapeHtml(p.desc || 'без описания')}</div>
            <span class="type">${escapeHtml(p.type || 'место')}</span>
        </div>
    `).join('');
    
    grid.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', function() {
            const idx = parseInt(this.dataset.index);
            const placeName = places[idx].name;
            places.splice(idx, 1);
            saveData();
            render();
            showToast('Место "' + placeName + '" удалено');
        });
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Добавление
function addPlace() {
    const nameInput = document.getElementById('placeName');
    const addressInput = document.getElementById('placeAddress');
    const descInput = document.getElementById('placeDesc');
    
    const name = nameInput.value.trim();
    if (!name) {
        alert('Введите название места');
        return;
    }
    
    let address = addressInput.value.trim();
    if (address && !address.toLowerCase().includes('орехово-зуево')) {
        address = address + ', Орехово-Зуево';
    } else if (!address) {
        address = 'Орехово-Зуево';
    }
    
    const newPlace = {
        name: name.slice(0, 40),
        address: address.slice(0, 70),
        desc: (descInput.value.trim() || 'без описания').slice(0, 80),
        type: 'место'
    };
    
    places.push(newPlace);
    saveData();
    render();
    showToast('Место "' + name + '" добавлено');
    
    notifyNewPlace(name);
    
    nameInput.value = '';
    addressInput.value = '';
    descInput.value = '';
}

// Toast
function showToast(message) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 3000);
}

// PWA установка
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('active');
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') {
            document.getElementById('installBanner').classList.remove('active');
            showToast('Приложение установлено');
            showNotification('Установка завершена', 'Приложение Орехово-Зуево успешно установлено');
        }
        deferredPrompt = null;
    }
});

window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('active');
    showToast('Спасибо за установку');
});

// Офлайн
function updateOnlineStatus() {
    const banner = document.getElementById('offlineBanner');
    if (!navigator.onLine) {
        banner.classList.add('active');
    } else {
        banner.classList.remove('active');
    }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('serviceworker.js')
            .then(function(registration) {
                console.log('Service Worker зарегистрирован:', registration.scope);
            })
            .catch(function(error) {
                console.log('Ошибка регистрации SW:', error);
            });
    });
}

// Инициализация уведомлений
if ("Notification" in window && Notification.permission === "default") {
    setTimeout(function() {
        if (confirm("Включить уведомления от Орехово-Зуево?\n\nВы будете получать оповещения о новых местах.")) {
            requestNotificationPermission();
        }
    }, 2000);
}

document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('notifyBtn');
    if (btn) {
        btn.addEventListener('click', function() {
            if (Notification.permission === "granted") {
                showNotification(
                    "Уведомления включены",
                    "Орехово-Зуево будет присылать вам оповещения"
                );
            } else {
                requestNotificationPermission();
            }
        });
    }
});

// Инициализация
loadData();
render();

document.getElementById('addPlaceBtn').addEventListener('click', addPlace);

['placeName', 'placeAddress', 'placeDesc'].forEach(function(id) {
    document.getElementById(id).addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addPlace();
    });
});
</script>
</body>
</html>
