<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орехово-Зуево</title>
    
    <!-- Подключение PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f5a66">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

    <!-- Баннер установки приложения -->
    <div class="banner" id="installBanner">
        Установить приложение 
        <button id="installBtn">Установить</button>
    </div>
    
    <!-- Баннер офлайн-режима -->
    <div class="off" id="offlineBanner">Вы офлайн</div>
    
    <!-- Шапка сайта -->
    <div class="top">
        <h1>Орехово-Зуево</h1>
        <span class="badge">Все места</span>
        <span class="pwa">PWA</span>
    </div>
    
    <div class="sub">Достопримечательности</div>
    
    <!-- Кнопка уведомлений -->
    <div class="nw">
        <button class="nb" id="notifyBtn">Уведомления</button>
    </div>
    
    <!-- Список мест -->
    <div class="grid" id="placesGrid"></div>
    
    <!-- Форма добавления места -->
    <div class="add">
        <h3>Добавить место</h3>
        <div class="form">
            <div class="group">
                <label>Название</label>
                <input type="text" id="placeName" placeholder="Название" maxlength="40">
            </div>
            <div class="group">
                <label>Адрес</label>
                <input type="text" id="placeAddress" placeholder="ул. Ленина" maxlength="60">
            </div>
            <div class="group">
                <label>Описание</label>
                <input type="text" id="placeDesc" placeholder="Кратко" maxlength="80">
            </div>
            <button class="btn" id="addPlaceBtn">Добавить</button>
        </div>
    </div>
    
    <!-- Подвал -->
    <div class="foot">
        <span>Орехово-Зуево</span>
        <span>X - удалить</span>
        <span>Офлайн</span>
    </div>
    
</div>

<script>
// ============================================================
// 1. ДАННЫЕ
// ============================================================

// Список мест по умолчанию
const defaultPlaces = [
    {name: 'Парк Победа', address: 'ул. Ленина, 1', desc: 'Центральный парк', type: 'парк'},
    {name: 'Краеведческий музей', address: 'ул. Ленина, 15', desc: 'История города', type: 'музей'},
    {name: 'ДК Октябрь', address: 'ул. Ленина, 56', desc: 'Культурный центр', type: 'досуг'},
    {name: 'Набережная Клязьмы', address: 'ул. Набережная, 2', desc: 'Прогулка у воды', type: 'природа'},
    {name: 'Сквер Молодёжный', address: 'ул. Мира, 12', desc: 'Тихий сквер', type: 'отдых'}
];

// Переменные
let places = [];          // массив мест
let deferredPrompt = null; // для установки PWA

// ============================================================
// 2. РАБОТА С ХРАНИЛИЩЕМ
// ============================================================

// Загрузка данных из localStorage
function loadData() {
    try {
        const saved = localStorage.getItem('places');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                places = parsed;
                return;
            }
        }
    } catch(e) {}
    
    // Если данных нет - загружаем стандартные
    places = defaultPlaces.map(item => ({...item}));
    saveData();
}

// Сохранение данных в localStorage
function saveData() {
    try {
        localStorage.setItem('places', JSON.stringify(places));
    } catch(e) {}
}

// ============================================================
// 3. УВЕДОМЛЕНИЯ
// ============================================================

// Запрос разрешения на уведомления
function requestNotification() {
    // Проверка поддержки браузером
    if (!("Notification" in window)) {
        showToast('Браузер не поддерживает уведомления');
        return;
    }
    
    // Запрос разрешения
    Notification.requestPermission().then(permission => {
        if (permission === "granted") {
            showNotification('Уведомления включены', 'Оповещения будут приходить');
            showToast('Уведомления включены');
        } else {
            showToast('Уведомления отключены');
        }
    });
}

// Показ уведомления
function showNotification(title, body) {
    // Проверка разрешения
    if (Notification.permission !== "granted") return;
    
    // Настройки уведомления
    const options = {
        body: body || 'Привет',
        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>",
        vibrate: [200, 100, 200],
        requireInteraction: true
    };
    
    // Отправка через Service Worker или напрямую
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
            reg.showNotification(title || 'Орехово-Зуево', options);
        });
    } else {
        new Notification(title || 'Орехово-Зуево', options);
    }
}

// ============================================================
// 4. ОТРИСОВКА СПИСКА
// ============================================================

// Отрисовка всех мест
function render() {
    const grid = document.getElementById('placesGrid');
    
    // Проверка наличия данных
    if (!places.length) {
        grid.innerHTML = '<div class="empty">Нет мест</div>';
        return;
    }
    
    // Создание карточек
    grid.innerHTML = places.map((item, index) => `
        <div class="card">
            <div class="name">${escapeHtml(item.name)}</div>
            <button class="del" data-index="${index}">X</button>
            <div class="addr">${escapeHtml(item.address || 'адрес не указан')}</div>
            <div class="desc">${escapeHtml(item.desc || 'без описания')}</div>
            <span class="type">${escapeHtml(item.type || 'место')}</span>
        </div>
    `).join('');
    
    // Обработчики удаления
    grid.querySelectorAll('.del').forEach(btn => {
        btn.onclick = function() {
            const idx = parseInt(this.dataset.index);
            places.splice(idx, 1);   // удаление из массива
            saveData();              // сохранение
            render();               // перерисовка
            showToast('Удалено');
        };
    });
}

// Защита от XSS-атак
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ============================================================
// 5. ДОБАВЛЕНИЕ МЕСТА
// ============================================================

function addPlace() {
    // Получение значений из полей
    const nameInput = document.getElementById('placeName');
    const addressInput = document.getElementById('placeAddress');
    const descInput = document.getElementById('placeDesc');
    
    const name = nameInput.value.trim();
    
    // Проверка обязательного поля
    if (!name) {
        alert('Введите название');
        return;
    }
    
    // Формирование адреса
    let address = addressInput.value.trim();
    if (address && !address.toLowerCase().includes('орехово')) {
        address = address + ', Орехово-Зуево';
    } else if (!address) {
        address = 'Орехово-Зуево';
    }
    
    // Добавление в массив
    places.push({
        name: name.slice(0, 40),
        address: address.slice(0, 70),
        desc: (descInput.value.trim() || 'без описания').slice(0, 80),
        type: 'место'
    });
    
    // Сохранение и обновление
    saveData();
    render();
    showToast('Добавлено');
    
    // Уведомление о новом месте
    if (Notification.permission === "granted") {
        showNotification('Новое место', 'Добавлено: ' + name);
    }
    
    // Очистка полей
    nameInput.value = '';
    addressInput.value = '';
    descInput.value = '';
}

// ============================================================
// 6. ВСПЛЫВАЮЩИЕ СООБЩЕНИЯ
// ============================================================

function showToast(message) {
    // Удаление старого сообщения
    const old = document.querySelector('.toast');
    if (old) old.remove();
    
    // Создание нового
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    // Автоудаление через 3 секунды
    setTimeout(() => toast.remove(), 3000);
}

// ============================================================
// 7. УСТАНОВКА PWA
// ============================================================

// Перехват события установки
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('active');
});

// Обработчик кнопки установки
document.getElementById('installBtn').onclick = async () => {
    if (deferredPrompt) {
        const result = await deferredPrompt.prompt();
        if (result.outcome === 'accepted') {
            document.getElementById('installBanner').classList.remove('active');
            showToast('Установлено');
            showNotification('Установка', 'Готово');
        }
        deferredPrompt = null;
    }
};

// ============================================================
// 8. СТАТУС ОФЛАЙН
// ============================================================

function updateOnlineStatus() {
    const banner = document.getElementById('offlineBanner');
    if (!navigator.onLine) {
        banner.classList.add('active');
    } else {
        banner.classList.remove('active');
    }
}

// Подписка на события сети
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ============================================================
// 9. КНОПКА УВЕДОМЛЕНИЙ
// ============================================================

document.getElementById('notifyBtn').onclick = function() {
    if (Notification.permission === "granted") {
        showNotification('Уведомления', 'Работают');
    } else {
        requestNotification();
    }
};

// ============================================================
// 10. SERVICE WORKER
// ============================================================

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('serviceworker.js')
            .then(reg => console.log('SW зарегистрирован'))
            .catch(err => console.log('Ошибка SW:', err));
    });
}

// ============================================================
// 11. АВТОЗАПРОС УВЕДОМЛЕНИЙ
// ============================================================

if ("Notification" in window && Notification.permission === "default") {
    setTimeout(() => {
        if (confirm('Включить уведомления?')) {
            requestNotification();
        }
    }, 2000);
}

// ============================================================
// 12. ИНИЦИАЛИЗАЦИЯ
// ============================================================

// Загрузка данных
loadData();

// Отрисовка списка
render();

// Обработчик кнопки добавления
document.getElementById('addPlaceBtn').onclick = addPlace;

// Обработчики Enter в полях ввода
['placeName', 'placeAddress', 'placeDesc'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', e => {
        if (e.key === 'Enter') addPlace();
    });
});
</script>
</body>
</html>
