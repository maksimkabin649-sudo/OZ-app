<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орехово-Зуево</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f5a66">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
        body{background:#f4f7fb;display:flex;justify-content:center;padding:2rem 1rem}
        .container{max-width:1000px;width:100%;background:#fff;border-radius:2rem;padding:2rem 1.8rem;box-shadow:0 20px 40px -10px rgba(0,20,30,.15)}
        .install-banner{display:none;background:linear-gradient(135deg,#1f5a66,#0f414e);color:#fff;padding:1rem;border-radius:1rem;margin-bottom:1rem;text-align:center}
        .install-banner.active{display:block}
        .install-banner button{background:#fff;color:#1f5a66;border:none;padding:.5rem 1.5rem;border-radius:2rem;font-weight:600;cursor:pointer}
        .header{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:.25rem}
        h1{font-size:2.2rem;color:#1e3a4b}
        .badge{background:#e6f0f4;padding:.3rem 1rem;border-radius:40px;font-size:.85rem;font-weight:600;color:#1f5a66;border:1px solid #b6d0d4}
        .pwa{background:#2d6a7a;color:#fff;padding:.2rem .8rem;border-radius:30px;font-size:.7rem;font-weight:600}
        .subhead{color:#3e5f6b;margin-bottom:2rem;border-left:5px solid #5f9ea0;padding-left:1rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5rem;margin-bottom:2.5rem}
        .card{background:#f9fcff;border-radius:1.5rem;padding:1.2rem;border:1px solid #e9edf2;position:relative}
        .card::before{content:"Орехово-Зуево";position:absolute;top:-8px;right:12px;background:#5f9ea0;color:#fff;font-size:.6rem;font-weight:700;padding:.15rem .8rem;border-radius:30px;opacity:.7}
        .name{font-weight:700;font-size:1.3rem;color:#0a2a36;padding-right:30px}
        .address{font-size:.9rem;color:#2d6a7a;background:#e6f0f4;padding:.25rem .8rem;border-radius:30px;display:inline-block;margin:.4rem 0 .3rem}
        .desc{color:#2d4c58;margin:.3rem 0 .2rem;font-size:.95rem}
        .type{display:inline-block;background:#e1edf2;padding:.2rem .9rem;border-radius:30px;font-size:.75rem;font-weight:600;color:#1f4e5a;margin-top:.4rem}
        .del{background:none;border:none;color:#acbcc5;font-size:1.2rem;cursor:pointer;position:absolute;top:10px;right:12px}
        .del:hover{color:#c44a4a}
        .add-section{background:#edf4f7;border-radius:2rem;padding:1.6rem 1.8rem;border:2px dashed #b6d0d4}
        .add-section h3{font-size:1.2rem;color:#1a4050;margin-bottom:1rem}
        .form{display:flex;flex-wrap:wrap;gap:1rem}
        .form-group{flex:1 0 160px}
        .form-group label{display:block;font-size:.75rem;font-weight:600;color:#325b69;margin-bottom:.3rem}
        .form-group input{width:100%;padding:.7rem 1rem;border:1px solid #cddee5;border-radius:40px;font-size:.95rem}
        .form-group input:focus{outline:none;border-color:#3c8a94}
        .add-btn{background:#1f5a66;border:none;color:#fff;font-weight:600;padding:.7rem 2rem;border-radius:40px;cursor:pointer;height:48px}
        .add-btn:hover{background:#0f414e}
        .empty{text-align:center;color:#6f8e9a;padding:2rem 0;font-style:italic;grid-column:1/-1}
        .footer{margin-top:1.8rem;font-size:.8rem;color:#5f7f8a;text-align:center;border-top:1px solid #dfe9ef;padding-top:1.2rem;display:flex;justify-content:center;gap:1rem;flex-wrap:wrap}
        .footer span{background:#e6f0f4;padding:.2rem 1rem;border-radius:30px;color:#1f5a66}
        .offline{display:none;background:#ff6b6b;color:#fff;text-align:center;padding:.5rem;border-radius:1rem;margin-bottom:1rem}
        .offline.active{display:block}
        .toast{position:fixed;bottom:20px;right:20px;background:#1f5a66;color:#fff;padding:1rem 1.5rem;border-radius:1rem;z-index:999;animation:slideIn .3s}
        @keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @media(max-width:500px){.container{padding:1.2rem}h1{font-size:1.6rem}.form{flex-direction:column}.add-btn{width:100%}}
    </style>
</head>
<body>
<div class="container">
    <div class="install-banner" id="installBanner">
        📱 Установите приложение <button id="installBtn">Установить</button>
    </div>
    <div class="offline" id="offlineBanner">📡 Вы офлайн. Данные из кэша.</div>
    
    <div class="header">
        <h1>📍 Орехово-Зуево</h1>
        <span class="badge">✅ Все места в городе</span>
        <span class="pwa">📱 PWA</span>
    </div>
    <div class="subhead">Достопримечательности · адрес + описание</div>

    <div class="grid" id="placesGrid"></div>

    <div class="add-section">
        <h3>➕ Добавить место</h3>
        <div class="form">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="placeName" placeholder="Название" maxlength="40">
            </div>
            <div class="form-group">
                <label>Адрес</label>
                <input type="text" id="placeAddress" placeholder="ул. Ленина, 10" maxlength="60">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <input type="text" id="placeDesc" placeholder="Кратко" maxlength="80">
            </div>
            <button class="add-btn" id="addPlaceBtn">➕ Добавить</button>
        </div>
    </div>
    
    <div class="footer">
        <span>🏙️ Орехово-Зуево</span>
        <span>⚡ Нажмите ❌ чтобы удалить</span>
        <span>📱 Работает офлайн</span>
    </div>
</div>

<script>
// ---- ДАННЫЕ ----
const defaultPlaces = [
    {name:'Парк «Победа»',address:'ул. Ленина, 1, Орехово-Зуево',desc:'Центральный парк с фонтаном',type:'парк'},
    {name:'Краеведческий музей',address:'ул. Ленина, 15, Орехово-Зуево',desc:'История города',type:'музей'},
    {name:'ДК «Октябрь»',address:'ул. Ленина, 56, Орехово-Зуево',desc:'Культурный центр',type:'досуг'},
    {name:'Набережная Клязьмы',address:'ул. Набережная, 2, Орехово-Зуево',desc:'Прогулка у воды',type:'природа'},
    {name:'Сквер «Молодёжный»',address:'ул. Мира, 12, Орехово-Зуево',desc:'Тихий сквер',type:'отдых'},
    {name:'Фонтан на площади',address:'пл. Пушкина, 1, Орехово-Зуево',desc:'Главный фонтан',type:'достопримечательность'},
    {name:'Собор Рождества Богородицы',address:'ул. Ленина, 78, Орехово-Зуево',desc:'Главный храм',type:'храм'}
];

let places = [];
let deferredPrompt = null;

// ---- ЗАГРУЗКА ДАННЫХ ----
function loadData() {
    try {
        const saved = localStorage.getItem('places');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                places = parsed;
                return;
            }
        }
    } catch(e) {}
    places = defaultPlaces.map(p => ({...p}));
    saveData();
}

function saveData() {
    try {
        localStorage.setItem('places', JSON.stringify(places));
    } catch(e) {}
}

// ---- РЕНДЕР ----
function render() {
    const grid = document.getElementById('placesGrid');
    if (!places.length) {
        grid.innerHTML = '<div class="empty">✨ Нет мест · добавьте первое!</div>';
        return;
    }
    
    grid.innerHTML = places.map((p, i) => `
        <div class="card">
            <div class="name">${escapeHtml(p.name)} <span>📍</span></div>
            <button class="del" data-index="${i}">✕</button>
            <div class="address">🏠 ${escapeHtml(p.address || 'адрес не указан')}</div>
            <div class="desc">${escapeHtml(p.desc || '▪️ без описания')}</div>
            <span class="type">${escapeHtml(p.type || 'место')}</span>
        </div>
    `).join('');
    
    // Удаление
    grid.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', function() {
            const idx = parseInt(this.dataset.index);
            places.splice(idx, 1);
            saveData();
            render();
            showToast('🗑️ Место удалено');
        });
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ---- ДОБАВЛЕНИЕ ----
function addPlace() {
    const nameInput = document.getElementById('placeName');
    const addressInput = document.getElementById('placeAddress');
    const descInput = document.getElementById('placeDesc');
    
    const name = nameInput.value.trim();
    if (!name) {
        alert('Введите название места');
        return;
    }
    
    let address = addressInput.value.trim();
    if (address && !address.toLowerCase().includes('орехово-зуево')) {
        address += ', Орехово-Зуево';
    } else if (!address) {
        address = 'Орехово-Зуево';
    }
    
    places.push({
        name: name.slice(0, 40),
        address: address.slice(0, 70),
        desc: (descInput.value.trim() || '▪️ без описания').slice(0, 80),
        type: 'место'
    });
    
    saveData();
    render();
    showToast('✅ Место добавлено!');
    nameInput.value = '';
    addressInput.value = '';
    descInput.value = '';
}

// ---- TOAST ----
function showToast(message) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 3000);
}

// ---- PWA УСТАНОВКА ----
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('active');
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') {
            document.getElementById('installBanner').classList.remove('active');
            showToast('🎉 Приложение установлено!');
        }
        deferredPrompt = null;
    }
});

window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('active');
    showToast('🎉 Спасибо за установку!');
});

// ---- ОФЛАЙН ----
function updateOnlineStatus() {
    const banner = document.getElementById('offlineBanner');
    if (!navigator.onLine) {
        banner.classList.add('active');
    } else {
        banner.classList.remove('active');
    }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ---- SERVICE WORKER ----
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('serviceworker.js')
            .then(function(registration) {
                console.log('✅ Service Worker зарегистрирован:', registration.scope);
            })
            .catch(function(error) {
                console.log('❌ Ошибка регистрации SW:', error);
            });
    });
}

// ---- ИНИЦИАЛИЗАЦИЯ ----
loadData();
render();

document.getElementById('addPlaceBtn').addEventListener('click', addPlace);

// Enter
document.getElementById('placeName').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addPlace();
});
document.getElementById('placeAddress').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addPlace();
});
document.getElementById('placeDesc').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addPlace();
});
</script>
</body>
</html>
